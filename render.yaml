services:
  - type: web
    name: shl-assessment-recommender
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app:app --host 0.0.0.0 --port $PORT
    pythonVersion: 3.11
    envVars:
      - key: PORT
        value: 8000
      - key: PYTHON_UNHANDLED_EXCEPTION_HANDLER
        value: print
